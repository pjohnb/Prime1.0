openapi: "3.0.3"
info:
  title: PRIME API
  version: "1.0.0"
  description: Read-only REST API for PRIME v1.0 Lovable UI consumption.
servers:
  - url: http://localhost:5001
    description: Local development
paths:
  /api/v1/positions:
    get:
      summary: Get all OPEN positions
      operationId: getPositions
      responses:
        "200":
          description: List of open positions
          content:
            application/json:
              schema:
                type: object
                properties:
                  positions:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
  /api/v1/signals:
    get:
      summary: Get recent signals
      operationId: getSignals
      parameters:
        - name: strategy
          in: query
          schema:
            type: string
        - name: instrument_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: object
                properties:
                  signals:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
  /api/v1/advisory/positions:
    get:
      summary: AI HOLD/TRIM/EXIT advisory per open position
      operationId: getPositionAdvisory
      description: >
        Runs the Claude position advisor over all OPEN positions. Degrades
        gracefully: each entry returns recommendation "UNAVAILABLE" when the
        API is unreachable (HTTP 200, never an error to the UI).
      responses:
        "200":
          description: Per-position recommendations
          content:
            application/json:
              schema:
                type: object
                properties:
                  advisories:
                    type: array
                    items:
                      type: object
                      properties:
                        symbol: {type: string}
                        recommendation: {type: string}
                        confidence: {type: string}
                        reasoning: {type: string}
                        suggested_action: {type: string}
                  count:
                    type: integer
  /api/v1/advisory/briefing:
    get:
      summary: One-call AI portfolio briefing
      operationId: getAdvisoryBriefing
      description: >
        Aggregates open positions, today's signal quality, and concentration
        warnings, then asks Claude for a desk briefing. Degrades to a
        deterministic summary (HTTP 200) when the API is unavailable.
      responses:
        "200":
          description: Portfolio briefing
          content:
            application/json:
              schema:
                type: object
                properties:
                  headline: {type: string}
                  positions_summary: {type: string}
                  signals_summary: {type: string}
                  concentration_warnings:
                    type: array
                    items: {type: string}
                  recommended_actions:
                    type: array
                    items: {type: string}
  /api/v1/strategies:
    get:
      summary: Distinct strategies present in prime_signals
      operationId: getStrategies
      responses:
        "200":
          description: List of strategy names
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategies:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
  /api/v1/analytics/summary:
    get:
      summary: Analytics overview summary
      operationId: getAnalyticsSummary
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategies:
                    type: array
                    items:
                      type: object
                  total_pnl:
                    type: number
                  total_signals:
                    type: integer
  /api/v1/analytics/by-strategy:
    get:
      summary: Analytics by strategy
      operationId: getAnalyticsByStrategy
      parameters:
        - name: strategy
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Strategy breakdown
          content:
            application/json:
              schema:
                type: object
  /api/v1/health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Server healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  db_connected:
                    type: boolean
                  last_scan_event:
                    type: string
                    nullable: true
        "503":
          description: Server degraded
  /api/v1/trades:
    post:
      summary: Submit a PAPER trade (write path)
      operationId: createTrade
      description: >
        Localhost + bearer-token protected. Validates PAPER mode and writes to
        prime_trade_log. Rejects in LIVE mode (403), without a valid token
        (401), and on duplicate submission within 60s (409).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, qty, strategy, direction, price]
              properties:
                symbol:
                  type: string
                qty:
                  type: integer
                strategy:
                  type: string
                direction:
                  type: string
                  enum: [LONG, SHORT, BUY, SELL]
                account:
                  type: string
                price:
                  type: number
      responses:
        "201":
          description: Trade created
          content:
            application/json:
              schema:
                type: object
                properties:
                  log_id:
                    type: string
                  status:
                    type: string
                  trade_source:
                    type: string
        "400":
          description: Invalid payload
        "401":
          description: Missing or invalid token
        "403":
          description: Not in PAPER mode or non-localhost
        "409":
          description: Duplicate trade within 60s
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
